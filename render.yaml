services:
  - type: web
    name: hermes-agent
    runtime: docker

    # Starter plan is the minimum — free tier sleeps and resets memory
    plan: starter

    autoDeploy: true

    # Persistent disk keeps Hermes memory, skills, sessions and configs
    # across restarts. Without this everything is lost on redeploy.
    disk:
      name: hermes-data
      mountPath: /data
      sizeGB: 10

    envVars:
      - key: HERMES_HOME
        value: /data/.hermes

      # OpenRouter key — set this value in the Render dashboard (not here)
      - key: OPENROUTER_API_KEY
        sync: false

      # Provider — entrypoint script reads this to auto-configure Hermes
      - key: HERMES_PROVIDER
        value: openrouter

      # Default model — change to any OpenRouter model slug you prefer:
      #   deepseek/deepseek-chat         (cheap + great coding)
      #   anthropic/claude-sonnet-4      (best reasoning)
      #   google/gemini-2.5-pro          (huge context)
      #   qwen/qwen3-235b-a22b           (massive open-weight)
      - key: HERMES_MODEL
        value: deepseek/deepseek-chat

      - key: PORT
        value: "8000"
